{{ $contents := slice }}
{{ range .Params.contents }}
  {{ if eq .html_class "block-class-related" }}
    {{ $contents = $contents | append . }}
  {{ end }}
{{ end }}
<div class="related__blocks">
  {{ partial "contents/list.html" (dict
    "context" .
    "contents" $contents
    "prefix" "related-"
  ) }}
</div>
